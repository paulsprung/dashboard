# Production compose for the Raspberry Pi.
# The image is built by GitHub Actions and published to GHCR — the Pi never
# needs the source code, npm, or a TypeScript compiler.
#
# First-time setup:
#   1. Copy this file + .env.example to ~/pi-agent/ on the Pi
#   2. Rename .env.example to .env and fill in your values
#   3. docker compose -f compose.prod.yml pull
#   4. docker compose -f compose.prod.yml up -d
#
# To update after a new release:
#   docker compose -f compose.prod.yml pull && docker compose -f compose.prod.yml up -d

services:
  pi-agent:
    image: ghcr.io/paulsprung/sm-pi-agent:latest
    container_name: sm-pi-agent
    restart: unless-stopped
    env_file:
      - .env
    network_mode: host        # needed for ARP table + mDNS discovery
    volumes:
      - /proc/net/arp:/proc/net/arp:ro   # read-only ARP table for device discovery
      - ./data:/app/data                  # device configs + audit log — BACK THIS UP
