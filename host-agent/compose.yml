# Production compose for a Proxmox / Docker host.
# Uses the pre-built image from GHCR — no source code or build tools needed.
#
# First-time setup:
#   1. Copy this file + .env.example to ~/sm-host-agent/ on the host
#   2. cp .env.example .env && nano .env  (set PI_AGENT_URL + AGENT_SECRET)
#   3. echo YOUR_GITHUB_TOKEN | docker login ghcr.io -u YOUR_GITHUB_USERNAME --password-stdin
#   4. docker compose pull
#   5. docker compose up -d
#
# To update:
#   docker compose pull && docker compose up -d

services:
  sm-host-agent:
    image: ghcr.io/paulsprung/sm-host-agent:latest
    container_name: sm-host-agent
    restart: unless-stopped
    env_file:
      - .env
    # Docker socket access so the agent can detect and report Docker services
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    network_mode: host
