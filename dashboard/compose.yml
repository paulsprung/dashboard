# Production compose for the Hetzner server.
# Uses the pre-built image from GHCR — no source code or build tools needed.
#
# First-time setup:
#   1. Copy this file + .env.example to ~/sm-dashboard/ on the server
#   2. Fill in .env
#   3. echo YOUR_GITHUB_TOKEN | docker login ghcr.io -u YOUR_GITHUB_USERNAME --password-stdin
#   4. docker compose -f compose.prod.yml pull
#   5. docker compose -f compose.prod.yml up -d
#
# To update:
#   docker compose -f compose.prod.yml pull && docker compose -f compose.prod.yml up -d

services:
  sm-dashboard:
    image: ghcr.io/paulsprung/sm-dashboard:latest
    container_name: sm-dashboard
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:3001:3001"

  postgres:
    image: postgres:16-alpine
    container_name: sm-dashboard-postgres
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - pg_data:/var/lib/postgresql/data

volumes:
  pg_data:
