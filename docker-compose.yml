version: '3.9'
services:
  app:
    build: .
    ports: ["3000:3000"]
    env_file: .env
    depends_on: [db]
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
      POSTGRES_DB: shyy_dashboard
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports: ["5432:5432"]
volumes:
  pgdata:
