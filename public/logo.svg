<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0F1629"/>
      <stop offset="1" stop-color="#1B3776"/>
    </linearGradient>
    <radialGradient id="bg-glow" cx="256" cy="180" r="260" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2563EB" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#2563EB" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="house-grad" x1="256" y1="145" x2="256" y2="385" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#C6DCFF"/>
    </linearGradient>
    <linearGradient id="roof-grad" x1="256" y1="145" x2="256" y2="278" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#D8E8FF"/>
    </linearGradient>
    <filter id="house-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="18" flood-color="#4A90E2" flood-opacity="0.35"/>
    </filter>
    <filter id="dot-glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="win-glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="round">
      <rect width="512" height="512" rx="112"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <rect width="512" height="512" rx="112" fill="url(#bg-glow)"/>

  <!-- Subtle bottom-fill darkening -->
  <rect width="512" height="512" rx="112" fill="url(#bottom-dark)" opacity="0.4"/>

  <g clip-path="url(#round)">
    <!-- Soft inner light top -->
    <ellipse cx="256" cy="60" rx="220" ry="120" fill="#2B5CE6" fill-opacity="0.12"/>

    <!-- House group with glow -->
    <g filter="url(#house-glow)">
      <!-- Roof: clean triangle with slight overhang -->
      <path d="M256 142 L392 274 L120 274 Z" fill="url(#roof-grad)"/>
      <!-- Wall body -->
      <rect x="152" y="268" width="208" height="117" rx="6" fill="url(#house-grad)"/>
    </g>

    <!-- Door: arch -->
    <path d="M228 385 L228 316 Q228 288 256 288 Q284 288 284 316 L284 385 Z"
      fill="#0A1428" fill-opacity="0.52"/>

    <!-- Left window -->
    <g filter="url(#win-glow)">
      <rect x="168" y="288" width="44" height="42" rx="9"
        fill="#60A5FA" fill-opacity="0.28"/>
      <rect x="168" y="288" width="44" height="42" rx="9"
        stroke="#93C5FD" stroke-width="1.5" fill="none" stroke-opacity="0.6"/>
    </g>

    <!-- Right window -->
    <g filter="url(#win-glow)">
      <rect x="300" y="288" width="44" height="42" rx="9"
        fill="#60A5FA" fill-opacity="0.28"/>
      <rect x="300" y="288" width="44" height="42" rx="9"
        stroke="#93C5FD" stroke-width="1.5" fill="none" stroke-opacity="0.6"/>
    </g>

    <!-- Roof ridge line (subtle) -->
    <line x1="200" y1="210" x2="312" y2="210" stroke="white" stroke-width="1.5" stroke-opacity="0.12"/>

    <!-- Smart dot at peak -->
    <circle cx="256" cy="142" r="18" fill="#3B82F6" fill-opacity="0.5" filter="url(#dot-glow)"/>
    <circle cx="256" cy="142" r="10" fill="#93C5FD"/>
    <circle cx="256" cy="142" r="5"  fill="white"/>
  </g>
</svg>
